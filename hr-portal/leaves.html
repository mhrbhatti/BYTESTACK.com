<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ByteStack HR — Leaves</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<div class="top-accent"></div>
<div class="app-layout">
  <div id="layout-sidebar"></div>
  <div class="main-area">
    <div class="topbar" id="topbar"></div>
    <div class="content-area">
      <div class="tabs-bar mb16">
        <button class="tab-btn active" onclick="showTab('requests',this)">Leave Requests</button>
        <button class="tab-btn" onclick="showTab('balances',this)">Leave Balances</button>
        <button class="tab-btn" onclick="showTab('calendar',this)">Calendar</button>
      </div>

      <!-- REQUESTS -->
      <div id="tab-requests">
        <div class="filter-bar mb16">
          <select class="form-input" style="width:160px" onchange="filterLeaves(this.value)">
            <option value="">All Status</option><option>Pending</option><option>Approved</option><option>Rejected</option>
          </select>
          <select class="form-input" style="width:160px" onchange="filterLeaves(undefined,this.value)">
            <option value="">All Types</option><option>Annual</option><option>Sick</option><option>Casual</option><option>Unpaid</option>
          </select>
          <button class="btn btn-primary" onclick="openModal('addLeave')">+ New Request</button>
        </div>
        <div class="card"><div class="table-wrap"><table>
          <thead><tr><th>Employee</th><th>Type</th><th>From</th><th>To</th><th>Days</th><th>Reason</th><th>Applied</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="leave-tbody"></tbody>
        </table></div></div>
      </div>

      <!-- BALANCES -->
      <div id="tab-balances" style="display:none">
        <div class="card"><div class="table-wrap"><table>
          <thead><tr><th>Employee</th><th>Annual (25)</th><th>Sick (10)</th><th>Casual (12)</th><th>Total Used</th><th>Total Remaining</th></tr></thead>
          <tbody id="bal-tbody"></tbody>
        </table></div></div>
      </div>

      <!-- CALENDAR -->
      <div id="tab-calendar" style="display:none">
        <div class="card">
          <div class="card-header"><div class="card-title">LEAVE CALENDAR — JUNE 2024</div></div>
          <div class="cal-header" id="cal-header"></div>
          <div class="cal-grid" id="cal-grid"></div>
          <div style="display:flex;gap:20px;margin-top:14px;flex-wrap:wrap">
            <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3)"><div style="width:10px;height:10px;border-radius:2px;background:rgba(232,255,0,.18)"></div>Today</div>
            <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3)"><div style="width:10px;height:10px;border-radius:2px;background:rgba(255,68,68,.1)"></div>Annual Leave</div>
            <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3)"><div style="width:10px;height:10px;border-radius:2px;background:rgba(255,140,0,.1)"></div>Sick Leave</div>
            <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3)"><div style="width:10px;height:10px;border-radius:2px;background:rgba(68,136,255,.1)"></div>Holiday</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="notif-panel" id="notif-panel"></div>

<!-- ADD LEAVE MODAL -->
<div class="modal-overlay" id="modal-addLeave">
  <div class="modal">
    <div class="modal-header"><div class="modal-title">LEAVE REQUEST</div><button class="modal-close" onclick="closeModal('addLeave')">✕</button></div>
    <div class="modal-body">
      <div class="form-grid-2">
        <div class="form-group span-2"><label class="form-label required">Employee</label>
          <select class="form-input" id="l-emp"></select>
        </div>
        <div class="form-group"><label class="form-label required">Leave Type</label>
          <select class="form-input" id="l-type"><option>Annual</option><option>Sick</option><option>Casual</option><option>Unpaid</option><option>Maternity</option><option>Paternity</option></select>
        </div>
        <div class="form-group"><label class="form-label">Days</label><input class="form-input" id="l-days" type="number" readonly></div>
        <div class="form-group"><label class="form-label required">From</label><input type="date" class="form-input" id="l-from" onchange="calcDays()"></div>
        <div class="form-group"><label class="form-label required">To</label><input type="date" class="form-input" id="l-to" onchange="calcDays()"></div>
        <div class="form-group span-2"><label class="form-label">Reason</label><textarea class="form-input" id="l-reason" rows="2" placeholder="Reason for leave…"></textarea></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('addLeave')">Cancel</button>
      <button class="btn btn-primary" onclick="saveLeave()">Submit Request</button>
    </div>
  </div>
</div>

<script src="js/auth.js"></script><script src="js/data.js"></script><script src="js/ui.js"></script><script src="js/layout.js"></script>
<script>
Layout.init('leaves','Leave Management','Manage time off requests',{label:'+ New Request',fn:"openModal('addLeave')"});
let lFilterStatus='',lFilterType='';

function filterLeaves(status,type){
  if(status!==undefined)lFilterStatus=status;
  if(type!==undefined)lFilterType=type;
  renderLeaves();
}

function renderLeaves(){
  let leaves=DB.getAll('leaves');
  if(lFilterStatus)leaves=leaves.filter(l=>l.status===lFilterStatus);
  if(lFilterType)leaves=leaves.filter(l=>l.type===lFilterType);
  const isAdmin=Auth.isAdmin();const isMgr=Auth.isManager();
  const session=Auth.getSession();
  if(!isAdmin&&!isMgr)leaves=leaves.filter(l=>l.emp===session.name);

  document.getElementById('leave-tbody').innerHTML=leaves.length?leaves.map(l=>`<tr>
    <td class="td-bold">${l.emp}</td>
    <td>${l.type}</td>
    <td>${UI.formatDate(l.from)}</td>
    <td>${UI.formatDate(l.to)}</td>
    <td>${l.days}</td>
    <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.reason}</td>
    <td>${UI.formatDate(l.appliedOn)}</td>
    <td>${UI.badge(l.status)}</td>
    <td><div class="td-actions">
      ${l.status==='Pending'&&(isAdmin||isMgr)?`
        <button class="btn btn-success btn-xs" onclick="changeLeave('${l.id}','Approved')">✓</button>
        <button class="btn btn-danger btn-xs" onclick="changeLeave('${l.id}','Rejected')">✕</button>`:''}
      ${isAdmin?`<button class="btn btn-danger btn-xs" onclick="deleteLeave('${l.id}')">🗑️</button>`:''}
    </div></td>
  </tr>`).join(''):`<tr><td colspan="9"><div class="empty-state"><div class="empty-icon">🏖️</div><div class="empty-title">No leave requests</div></div></td></tr>`;
}

function changeLeave(id,status){
  DB.update('leaves',id,{status,approvedBy:Auth.getSession().name});
  Auth.logActivity('Leave '+status.toLowerCase()+' for '+DB.getById('leaves',id)?.emp);
  UI.toast('Leave '+status.toLowerCase()+'!',status==='Approved'?'success':'error');
  renderLeaves();
}
function deleteLeave(id){
  if(!UI.confirm('Delete this leave request?'))return;
  DB.remove('leaves',id);UI.toast('Deleted.','error');renderLeaves();
}

function renderBalances(){
  const emps=DB.getAll('employees');
  document.getElementById('bal-tbody').innerHTML=emps.map(e=>{
    const b=DB.getEmployeeLeaveBalance(e.id);
    const used=b.Annual.used+b.Sick.used+b.Casual.used;
    const rem=b.Annual.remaining+b.Sick.remaining+b.Casual.remaining;
    return`<tr>
      <td class="td-bold"><div class="avatar-row">${UI.avatar(e.first+' '+e.last,e.dept)}<div class="avatar-info"><div class="name">${e.first} ${e.last}</div><div class="sub">${e.dept}</div></div></div></td>
      <td><span style="color:var(--green)">${b.Annual.remaining}</span>/${b.Annual.total}</td>
      <td><span style="color:var(--blue)">${b.Sick.remaining}</span>/${b.Sick.total}</td>
      <td><span style="color:var(--orange)">${b.Casual.remaining}</span>/${b.Casual.total}</td>
      <td>${used}</td>
      <td style="color:var(--accent)">${rem}</td>
    </tr>`;
  }).join('');
}

function renderCalendar(){
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  document.getElementById('cal-header').innerHTML=days.map(d=>`<div class="cal-day-label">${d}</div>`).join('');
  const now=new Date();const yr=now.getFullYear();const mo=now.getMonth();
  const first=new Date(yr,mo,1).getDay();const last=new Date(yr,mo+1,0).getDate();
  const leaveDays=[10,11,12,13,15];const sickDays=[7];const holidays=[17,19];
  let html='';
  for(let i=0;i<first;i++)html+=`<div class="cal-cell off"></div>`;
  for(let d=1;d<=last;d++){
    let cls='cal-cell';
    if(d===now.getDate())cls+=' today';
    else if(holidays.includes(d))cls+=' holiday';
    else if(leaveDays.includes(d))cls+=' leave';
    else if(sickDays.includes(d))cls+=' leave';
    html+=`<div class="${cls}">${d}</div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
}

function showTab(tab,btn){
  document.querySelectorAll('.tab-btn').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  ['requests','balances','calendar'].forEach(t=>{document.getElementById('tab-'+t).style.display=t===tab?'':'none'});
  if(tab==='balances')renderBalances();
  if(tab==='calendar')renderCalendar();
}

function calcDays(){
  const f=document.getElementById('l-from').value,t=document.getElementById('l-to').value;
  if(f&&t){const d=Math.max(1,Math.round((new Date(t)-new Date(f))/86400000)+1);document.getElementById('l-days').value=d;}
}

function openAddLeave(){
  const emps=DB.getAll('employees');
  document.getElementById('l-emp').innerHTML=emps.map(e=>`<option value="${e.id}">${e.first} ${e.last}</option>`).join('');
  document.getElementById('l-from').value='';document.getElementById('l-to').value='';
  document.getElementById('l-days').value='';document.getElementById('l-reason').value='';
  UI.openModal('addLeave');
}
window.openModal=(id)=>{if(id==='addLeave')openAddLeave();else UI.openModal(id);};

function saveLeave(){
  const g=id=>document.getElementById(id).value;
  if(!g('l-from')||!g('l-to')){UI.toast('Select dates','error');return;}
  const empId=g('l-emp');const e=DB.getById('employees',empId);
  DB.add('leaves',{
    id:DB.nextId('leaves','LV'),empId,emp:e.first+' '+e.last,
    type:g('l-type'),from:g('l-from'),to:g('l-to'),days:+g('l-days')||1,
    reason:g('l-reason'),status:'Pending',appliedOn:new Date().toISOString().slice(0,10),approvedBy:''
  });
  Auth.logActivity('Leave request submitted for '+e.first+' '+e.last);
  UI.closeModal('addLeave');UI.toast('Leave request submitted!');renderLeaves();
}

renderLeaves();
</script>
</body>
</html>
